<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Dafam Pekalongan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#111;
    color:#fff;
}

/* WELCOME SCREEN */
#welcome{
    position:relative;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    padding:60px;
}

.bg-slide{
    position:absolute;
    inset:0;
    z-index:-2;

    background-size:cover;
    background-position:center;

    transition:background-image 1.5s ease-in-out;
}

.bg-overlay{
    position:absolute;
    inset:0;
    z-index:-1;

    background:
    linear-gradient(
        to right,
        rgba(0,0,0,.85),
        rgba(0,0,0,.35)
    );
}


.left{
    position:relative;
    z-index:5;
   
}

.logo{
    font-size:40px;
    color:#d4af37;
    font-weight:bold;
    margin-bottom:25px;
}
.logo img{
    width:clamp(120px, 15vw, 260px);
    height:auto;
    display:block;
    object-fit:contain;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.4));
}


.welcome-title{
    font-size:clamp(48px,4.5vw,72px);
    font-family:Georgia,serif;
    color:#ffffff;
    text-shadow:0 4px 15px rgba(0,0,0,.4);
    margin-bottom:8px;
}

.guest{
    font-size:45px;
    font-style:italic;
    margin:15px 0;
}

.desc{
    font-size:24px;
    line-height:1.6;
    opacity:.9;
    margin-top:20px;
}

.info{
    display:flex;
    gap:50px;
    margin-top:50px;
}

.info-box{
    border-left:3px solid #d4af37;
    padding-left:15px;
}

.info-box h4{
    color:#d4af37;
    margin-bottom:8px;
}



.time{
    font-size:42px;
}

.date{
    font-size:20px;
    opacity:.8;
}

.bottom-msg{
    position:absolute;
    bottom:40px;
    left:60px;
    font-size:24px;
    color:#d4af37;
}

/* MENU SCREEN */

#menu{
    min-height:100vh;
    background:linear-gradient(135deg,#111,#222);
    padding:40px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
}

.header h2{
    color:#d4af37;
    font-size:38px;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:40px;
    text-align:center;
    transition:.3s;
    cursor:pointer;
}

.card:hover{
    transform:scale(1.03);
    border-color:#d4af37;
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

.card h3{
    color:#d4af37;
    margin-bottom:15px;
    font-size:28px;
}

.card p{
    font-size:18px;
    opacity:.8;
}

.footer{
    margin-top:40px;
    text-align:center;
    font-size:20px;
    color:#d4af37;
}


.logo img{
    width:clamp(140px,18vw,300px);
    height:auto;
}

.hotel{
    font-size:clamp(22px,2vw,38px);
    letter-spacing:4px;
    color:#d4af37;
    font-weight:600;
}
    .guest{
    display:inline-block;
    background:rgba(255,255,255,.95);
    color:#111;
    padding:14px 35px;
    border-left:6px solid #d4af37;
    border-radius:10px;
    font-size:45px;
    font-style:italic;
    font-weight:600;
    margin:20px 0;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

   

.weather-icon{
    font-size:48px;
}

.weather-title{
    font-size:14px;
    opacity:.8;
}

.weather-desc{
    font-size:24px;
    font-weight:600;
}

.weather-temp{
    font-size:18px;
    color:#d4af37;
}

.weather-city{
    font-size:14px;
    opacity:.7;
}

 .top-right{
    display:flex;
    align-items:center;
    gap:12px;
}   



.time{
    font-size:28px;
    font-weight:600;
}

.date{
    font-size:12px;
    opacity:.8;
}



.weather-panel{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(10px);
    padding:10px 16px;
    border-radius:14px;
    border:1px solid rgba(255,255,255,.15);
    padding:8px 12px;
    border-radius:12px;
}
.weather-icon{
    font-size:clamp(24px,2vw,32px);
}

.weather-desc{
    font-size:clamp(14px,1vw,18px);
    font-weight:600;
    line-height:1.2;
}

.weather-temp{
    font-size:clamp(12px,.9vw,15px);
    color:#d4af37;
}

.weather-city,
.weather-title{
    display:none;
}
   


.weather-icon{
    font-size:22px;
}

.weather-desc{
    font-size:14px;
}

.weather-temp{
    font-size:12px;
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;

    width:100%;
    margin-bottom:70px;
}

.time-panel{
    text-align:right;
}

.top-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.left{
    position:relative;
    z-index:5;
    width:100%;
    height:100%;
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:80px;
}

.hotel-brand{
    display:flex;
    align-items:center;
    gap:20px;
}

.hotel-name{
    font-size:34px;
    font-weight:600;
    letter-spacing:4px;
    color:#d4af37;
}

.top-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.content-area{
    max-width:800px;
}

.logo img{
    width:230px;
}

.time{
    font-size:30px;
    font-weight:700;
}

.date{
    font-size:13px;
}

.weather-panel{
    display:flex;
    align-items:center;
    gap:10px;

    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);

    padding:10px 14px;
    border-radius:12px;
}

.welcome-title{
    font-size:52px;
    font-family:Georgia,serif;
    margin-bottom:10px;
}

.guest{
    font-size:42px;
    margin-bottom:25px;
}

.desc{
    font-size:22px;
    line-height:1.7;
    max-width:700px;
}
</style>
</head>

<body>

<!-- WELCOME SCREEN -->

<section id="welcome">

    <div class="bg-slide" id="bgSlide"></div>
    <div class="bg-overlay"></div>


    
<div class="left">

    <div class="header-top">

        <div class="hotel-brand">

            <div class="logo">
                <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1780387378/logo_p3kevr.png">
            </div>

            <div class="hotel-name">
                PEKALONGAN
            </div>

        </div>

        <div class="top-right">

            <div class="time-panel">
                <div class="time" id="clock"></div>
                <div class="date" id="tanggal"></div>
            </div>

            <div class="weather-panel">
                <div class="weather-icon">☁️</div>

                <div>
                    <div class="weather-desc">Berawan</div>
                    <div class="weather-temp">24° - 33°C</div>
                </div>
            </div>

        </div>

    </div>

    <div class="content-area">

        <div class="welcome-title">
            Welcome
        </div>

        <div class="guest">
            Mr. Totok
        </div>

        <div class="desc">
            Selamat datang di Hotel Dafam Pekalongan.<br>
            Semoga Anda menikmati pengalaman menginap yang menyenangkan bersama kami.
        </div>

        <div class="info">

            <div class="info-box">
                <h4>Room Number</h4>
                <div>1208</div>
            </div>

            <div class="info-box">
                <h4>Check-In</h4>
                <div>20 Mei 2026</div>
            </div>

            <div class="info-box">
                <h4>Check-Out</h4>
                <div>22 Mei 2026</div>
            </div>

        </div>

    </div>

</div>



</section>

    <script>

function updateClock(){

    let now = new Date();

    let jam = now.toLocaleTimeString('id-ID',{
        hour:'2-digit',
        minute:'2-digit'
    });

    let tanggal = now.toLocaleDateString('id-ID',{
        weekday:'long',
        day:'numeric',
        month:'long',
        year:'numeric'
    });

    document.getElementById("clock").innerHTML = jam;
    document.getElementById("tanggal").innerHTML = tanggal;
}

setInterval(updateClock,1000);
updateClock();

const backgrounds = [
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Lobby_5_huw5gf.jpg',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1782354986/4_HD_dpsmen.png',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Royal_Suite_Room_ozwub7.jpg',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/ChatGPT_Image_May_25_2026_10_09_08_PM_dnlsas.png',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Welness_Center_gafsce.jpg'
];

const bgSlide = document.getElementById("bgSlide");

let currentBg = 0;

function changeBackground(){

    bgSlide.style.backgroundImage =
        `url('${backgrounds[currentBg]}')`;

    currentBg++;

    if(currentBg >= backgrounds.length){
        currentBg = 0;
    }
}

changeBackground();

setInterval(changeBackground,8000);

setInterval(() => {

    fetch("guest.json")
    .then(res => res.json())
    .then(data => {

        document.querySelector(".guest").textContent =
            data.guestName;

    });

}, 30000);
        
</script>


</body>
</html>
