<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>Hotel Dafam Pekalongan</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

#welcome{
    position:relative;
    height:100vh;
}

.bg-slide{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    z-index:-2;
}

.bg-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        to right,
        rgba(0,0,0,.85),
        rgba(0,0,0,.30)
    );
    z-index:-1;
}

.container{
    height:100%;
    padding:40px 70px;
    display:flex;
    flex-direction:column;
}

.header-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.hotel-brand{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo{
    width:180px;
}

.hotel-name{
    font-size:32px;
    font-weight:700;
    color:#d4af37;
    letter-spacing:3px;
}

.hotel-name span{
    font-size:22px;
}

.top-right{
    display:flex;
    align-items:center;
    gap:15px;
}

.time-panel{
    text-align:right;
}

.time{
    font-size:32px;
    font-weight:bold;
}

.date{
    font-size:14px;
}

.weather-panel{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.10);
    backdrop-filter:blur(12px);
    padding:10px 15px;
    border-radius:12px;
}

.content-area{
    margin-top:80px;
    max-width:900px;
}

.welcome-title{
    font-size:58px;
    margin-bottom:15px;
}

.guest{
    display:inline-block;
    background:white;
    color:#111;
    padding:15px 30px;
    border-left:6px solid #d4af37;
    border-radius:10px;
    font-size:40px;
    font-style:italic;
    margin-bottom:30px;
}

.desc{
    font-size:22px;
    line-height:1.7;
}

.info{
    margin-top:40px;
    display:flex;
    gap:40px;
}

.info-box{
    border-left:3px solid #d4af37;
    padding-left:15px;
}

.info-box h4{
    color:#d4af37;
    margin-bottom:8px;
}

.quick-menu{
    position:absolute;
    bottom:35px;
    right:40px;
    display:flex;
    gap:15px;
}

.menu-btn{
    text-decoration:none;
    color:#d4af37;
    border:1px solid #d4af37;
    padding:12px 20px;
    border-radius:50px;
    background:rgba(0,0,0,.35);
    backdrop-filter:blur(10px);
    font-weight:600;
    transition:.3s;
}

.menu-btn:hover{
    background:#d4af37;
    color:#000;
}
</style>
</head>

<body>

<section id="welcome">

    <div class="bg-slide" id="bgSlide"></div>
    <div class="bg-overlay"></div>

    <div class="container">

        <!-- HEADER -->
        <div class="header-top">

            <div class="hotel-brand">
                <img src="https://res.cloudinary.com/dvryknjyh/image/upload/v1780387378/logo_p3kevr.png" class="logo">

                <div class="hotel-name">
                    <span>PEKALONGAN</span>
                </div>
            </div>

            <div class="top-right">

                <div class="time-panel">
                    <div class="time" id="clock"></div>
                    <div class="date" id="tanggal"></div>
                </div>

                <div class="weather-panel">
                    <span>☁️</span>
                    <div>
                        <div>Berawan</div>
                        <small>24° - 33°C</small>
                    </div>
                </div>

            </div>

        </div>

        <!-- CONTENT -->
        <div class="content-area">

            <h1 class="welcome-title">Welcome</h1>

            <div class="guest">
                Mr. Totok
            </div>

            <p class="desc">
                Selamat datang di Hotel Dafam Pekalongan.<br>
                Semoga Anda menikmati pengalaman menginap yang menyenangkan bersama kami.
            </p>

            <div class="info">

                <div class="info-box">
                    <h4>Room Number</h4>
                    <span>1208</span>
                </div>

                <div class="info-box">
                    <h4>Check In</h4>
                    <span>20 Mei 2026</span>
                </div>

                <div class="info-box">
                    <h4>Check Out</h4>
                    <span>22 Mei 2026</span>
                </div>

            </div>

        </div>

        <!-- ICON MENU -->
        <div class="quick-menu">

            <a href="#" class="menu-btn">📺 IPTV</a>

            <a href="https://youtube.com" class="menu-btn">
                ▶ YouTube
            </a>

            <a href="https://netflix.com" class="menu-btn">
                🎬 Netflix
            </a>

        </div>

    </div>

</section>

</body>

    <script>

function updateClock(){

    let now = new Date();

    let jam = now.toLocaleTimeString('id-ID',{
        hour:'2-digit',
        minute:'2-digit'
    });

    let tanggal = now.toLocaleDateString('id-ID',{
        weekday:'long',
        day:'numeric',
        month:'long',
        year:'numeric'
    });

    document.getElementById("clock").innerHTML = jam;
    document.getElementById("tanggal").innerHTML = tanggal;
}

setInterval(updateClock,1000);
updateClock();

const backgrounds = [
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Lobby_5_huw5gf.jpg',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1782354986/4_HD_dpsmen.png',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Royal_Suite_Room_ozwub7.jpg',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/ChatGPT_Image_May_25_2026_10_09_08_PM_dnlsas.png',
'https://res.cloudinary.com/dvryknjyh/image/upload/v1779723173/Welness_Center_gafsce.jpg'
];

const bgSlide = document.getElementById("bgSlide");

let currentBg = 0;

function changeBackground(){

    bgSlide.style.backgroundImage =
        `url('${backgrounds[currentBg]}')`;

    currentBg++;

    if(currentBg >= backgrounds.length){
        currentBg = 0;
    }
}

changeBackground();

setInterval(changeBackground,8000);

setInterval(() => {

    fetch("guest.json")
    .then(res => res.json())
    .then(data => {

        document.querySelector(".guest").textContent =
            data.guestName;

    });

}, 30000);
        
</script>


</html>
